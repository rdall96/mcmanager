stages:
  - build
  - release


variables:
  image_name: "rdall96/mcmanager"
  dev_tag: '/^dev-\d.\d.\d$/'
  release_tag: '/^\d.\d.\d$/'


default:
  before_script:
    - docker info


# Release build and deploy
release-build:
  stage: build
  script:
    - docker login -u rdall96 -p $RDALL96_DOCKERHUB_TOKEN
    - docker build . -t $image_name:$CI_COMMIT_TAG
    - docker tag $image_name:$CI_COMMIT_TAG $image_name:latest
    - docker push $image_name:$CI_COMMIT_TAG
    - docker push $image_name:latest
  tags:
    - build
  rules:
    - if: $CI_COMMIT_TAG =~ $release_tag

create_release_and_deploy:
  stage: release
  script:
    - apk add curl
    - curl --location --output /usr/local/bin/release-cli "https://gitlab.com/api/v4/projects/gitlab-org%2Frelease-cli/packages/generic/release-cli/latest/release-cli-linux-amd64"
    - chmod +x /usr/local/bin/release-cli
    - echo 'Creating release $CI_COMMIT_TAG'
  rules:
    - if: $CI_COMMIT_TAG =~ $release_tag
  release:
    tag_name: $CI_COMMIT_TAG
    name: 'Release $CI_COMMIT_TAG'
    description: 'Automated release (maintainer to fill in details)'


# Development build
dev-build:
  stage: build
  script:
    - docker login -u rdall96 -p $RDALL96_DOCKERHUB_TOKEN
    - docker build -t $image_name:$CI_COMMIT_TAG .
    - docker tag $image_name:$CI_COMMIT_TAG $image_name:dev-latest
    - docker push $image_name:$CI_COMMIT_TAG
    - docker push $image_name:dev-latest
  tags:
    - build
  rules:
    - if: $CI_COMMIT_TAG =~ $dev_tag


# Manual build (for testing purposes)
manual-build:
  stage: build
  script:
    - docker login -u rdall96 -p $RDALL96_DOCKERHUB_TOKEN
    - docker build -t $image_name:$DOCKER_IMAGE_TAG .
    - docker push $image_name:$DOCKER_IMAGE_TAG
  tags:
    - build
  rules:
    - if: $DOCKER_IMAGE_TAG != null && $DOCKER_IMAGE_TAG != ""
      when: manual
