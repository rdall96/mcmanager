stages:
  - build
  - test
  - release


variables:
  # Commit tags regex to determine what pipeline to run
  RELEASE_TAG: '/^\d.\d.\d$/'
  # Name of the tag when doing manual builds
  CUSTOM_TAG: ''
  # Name of the main/default branch
  MAIN_BRANCH: 'main'
  # Image names
  PRIVATE_IMAGE: '$CI_REGISTRY/mcmanager/mcmanager'
  PUBLIC_IMAGE: '$DOCKERHUB_USER/mcmanager'
  # Tool versions, shared across jobs
  DOCKER_VERSION: '28.5.2'
  SWIFT_VERSION: '5.10-jammy'
  # docker-in-docker connection settings, shared by every job using the docker:*-dind service
  DOCKER_HOST: "tcp://docker:2376"
  DOCKER_TLS_CERTDIR: "/certs"

# Source paths that should trigger a dev build/test when changed
.source-changes: &source-changes
  - Dockerfile
  - Sources/**/*
  - Tests/**/*
  - Package.*


# Manual build - On custom build tags (for testing purposes)
manual:build:custom-tag:
  stage: build
  tags:
    - docker
  image: docker:$DOCKER_VERSION-cli
  services:
    - docker:$DOCKER_VERSION-dind
  before_script:
    - docker info
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Build and push to the private registry
    - docker build -t $PRIVATE_IMAGE:$CUSTOM_TAG .
    - docker push $PRIVATE_IMAGE:$CUSTOM_TAG
  rules:
    # run this when a custom tag is created (optional)
    - if: $CUSTOM_TAG != null && $CUSTOM_TAG != ""
      when: manual


# Development build - In merge requests
dev:build:
  stage: build
  tags:
    - build
  image: swift:$SWIFT_VERSION
  script:
    - swift package resolve
    - swift build -c debug --static-swift-stdlib
  artifacts:
    name: "MCManager-binary-debug"
    paths:
      # Shared with next dev stages so it doesn't need to rebuild
      - .build/debug/MCManager
    expire_in: 1 hour
  rules:
    # don't run this for release tags
    - if: $CI_COMMIT_TAG =~ $RELEASE_TAG
      when: never
    # run this at every push for the changed files
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $MAIN_BRANCH
      # and if we have changes in relevant files when pushing a new commit
      changes: *source-changes
      when: always
    # build for merge requests
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always


# Development test - Ensure the OAS file is valid and export it
dev:test:oas:
  stage: test
  tags:
    - shared
  # Plain distro image - no Swift toolchain needed, only running the binary built by dev:build.
  # It's the same Ubuntu release as the swift:$SWIFT_VERSION image so glibc matches.
  image: ubuntu:22.04
  needs:
    # Reuse the binary built by dev:build instead of rebuilding it here
    - dev:build
  before_script:
    # Tooling needed to fetch and validate the OAS, plus runtime libs/binaries the compiled binary needs
    # (openssh-client provides ssh-keygen, used by the app to generate its private key on first run)
    # (tzdata provides the IANA timezone database ISO8601DateFormatter/ICU needs to initialize)
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update && apt-get install -y --no-install-recommends curl python3-pip openssh-client tzdata libicu70 libcurl4 libxml2 libsqlite3-0 libatomic1 zlib1g
    - pip3 install --no-cache-dir openapi-spec-validator
  script:
    - ./scripts/verify-oas.sh
  artifacts:
    name: "MCManager-dev-OAS"
    paths:
      - oas.json
    expire_in: 1 week
  rules:
    # Run for pushes to the main branch when source files have changed
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $MAIN_BRANCH
      changes: *source-changes
      when: always
    # Run with every merge request
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always


# Development build - Create a dev image and upload it to the registry
dev:upload:registry:
  stage: release
  tags:
    - docker
  image: docker:$DOCKER_VERSION-cli
  services:
    - docker:$DOCKER_VERSION-dind
  before_script:
    - docker info
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Build the image and upload to to the private registry
    - |
      docker build -t $PRIVATE_IMAGE:dev-$CI_COMMIT_SHORT_SHA . \
      --build-arg C_OPTIMIZATION="-Og" \
      --build-arg BUILD_TYPE="debug"
    - docker push $PRIVATE_IMAGE:dev-$CI_COMMIT_SHORT_SHA
    # When building off the main branch, also tag and push dev-latest
    - |
      if [ "$CI_COMMIT_BRANCH" == "$MAIN_BRANCH" ]; then
        docker tag $PRIVATE_IMAGE:dev-$CI_COMMIT_SHORT_SHA $PRIVATE_IMAGE:dev-latest
        docker push $PRIVATE_IMAGE:dev-latest
      fi
  rules:
    # Pushes to the main branch
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $MAIN_BRANCH
      when: on_success
    # Manual trigger for merge requests (and optional)
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true


# Release build - New tags matching RELEASE_TAG
release:build:
  stage: build
  tags:
    - docker
  image: docker:$DOCKER_VERSION-cli
  services:
    - docker:$DOCKER_VERSION-dind
  before_script:
    - docker info
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Build and upload to private registry
    - docker build -t $PRIVATE_IMAGE:$CI_COMMIT_TAG .
    - docker push $PRIVATE_IMAGE:$CI_COMMIT_TAG
  rules:
    # run this when we have a release tag
    - if: $CI_COMMIT_TAG =~ $RELEASE_TAG


# Release test - Ensure the OAS file is valid and export it
release:generate:oas:
  stage: test
  tags:
    - build
  image: swift:$SWIFT_VERSION
  before_script:
    # Tooling needed to fetch and validate the OAS
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update && apt-get install -y --no-install-recommends curl python3-pip
    - pip3 install --no-cache-dir openapi-spec-validator
  script:
    # Build the app in DEBUG mode - the /oas.json endpoint is only registered in DEBUG builds
    - swift package resolve
    - swift build -c debug --static-swift-stdlib
    - ./scripts/verify-oas.sh
  artifacts:
    name: "MCManager-OAS"
    paths:
      - oas.json
    # Keep this artifact around indefinitely - the release links to it directly
    expire_in: never
  rules:
    # run this when we have a release tag
    - if: $CI_COMMIT_TAG =~ $RELEASE_TAG


# Release - Upload the image to dockerhub
release:upload:dockerhub:
  stage: release
  tags:
    - docker
  image: docker:$DOCKER_VERSION-cli
  services:
    - docker:$DOCKER_VERSION-dind
  before_script:
    - docker info
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker login -u $DOCKERHUB_USER -p $DOCKERHUB_TOKEN
    - docker pull $PRIVATE_IMAGE:$CI_COMMIT_TAG
  script:
    # Tag and push to DockerHub
    - docker tag $PRIVATE_IMAGE:$CI_COMMIT_TAG $PUBLIC_IMAGE:$CI_COMMIT_TAG
    - docker tag $PUBLIC_IMAGE:$CI_COMMIT_TAG $PUBLIC_IMAGE:latest
    - docker push $PUBLIC_IMAGE:$CI_COMMIT_TAG
    - docker push $PUBLIC_IMAGE:latest
  rules:
    - if: $CI_COMMIT_TAG =~ $RELEASE_TAG
      when: on_success


# Release - Create a GitLab release entry
release:publish:
  stage: release
  tags:
    - shared
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG =~ $RELEASE_TAG
      when: on_success
  release:
    tag_name: $CI_COMMIT_TAG
    name: 'Release $CI_COMMIT_TAG'
    description: '[DockerHub - MCManager](https://hub.docker.com/repository/docker/rdall96/mcmanager/general)\n$PUBLIC_IMAGE:$CI_COMMIT_TAG\nAutomated release (maintainer to fill in details)'
    assets:
      links:
        - name: 'OpenAPI spec (oas.json)'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/oas.json?job=release:generate:oas'
        - name: 'Docker image (Docker Hub)'
          url: 'https://hub.docker.com/r/${DOCKERHUB_USER}/mcmanager/tags?name=${CI_COMMIT_TAG}'
          link_type: image
